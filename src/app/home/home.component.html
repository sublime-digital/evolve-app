<div class="container-fluid">

    <p>
    <div class="row">

        <div class="col-md-5">

          <div class="card">
            <div class="card-header">
              <h1>Steps Today</h1>
            </div>
            <div class="card-body" style="min-height: 150px;max-height: 100px;">
              <h1>7,432 / 10,000</h1>
              <p></p>
                <h4>2,568 to goal</h4>
            </div>
          </div>

          <p></p>

          <div class="card">
            <div class="card-header">
              <h5 class="h5">Habit Streak</h5>
            </div>
            <div class="card-body" style="min-height: 150px;max-height: 100px;">
              <h2>14 DAY STREAK</h2>
            </div>
          </div>

          <p></p>

          <div class="card card__overlay">
            <div class="card-header">
              <h5 class="h5">Enter Today's Weight</h5>
            </div>
            <div class="card-body" style="min-height: 120px;max-height: 140px;">
              <input type='text'[(ngModel)]='date' placeholder='Date'>
              <input type='text'[(ngModel)]='weight' placeholder="Today's Weight">
              <p></p>
              <button type="button" class="btn btn-primary" (click)='handleClick()'>Add</button>
            </div>
          </div>
          <p></p>
          <div class="card">
            <div class="card-header">
              <h5 class="h5">Weekly Activity</h5>
            </div>
            <div class="card-body" style="min-height: 150px;max-height: 100px;">
              <h2>MON TUE WED THUR FRI SAT SUN</h2>
            </div>
          </div>
        </div>


        <div class="col-md-4">
          <div class="card">
            <div class="card-header">
              <h5>Weight Grid</h5>
            </div>
              <div class="card-body" style="min-height: 300px;max-height: 450px;">
                <table class="table table-striped table-sm" style="max-height: 400px;">
                  <thead>
                    <tr>
                      <th scope="col">Date</th>
                      <th scope="col">Weight</th>
                      <th scope="col"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>
                <ul>
                  <li *ngFor = "let line of weightData let i = index">
                      {{line.date}}
                  </li>
                </ul>
                      </td>
                      <td>
                  <ul>
                  <li *ngFor = "let line of weightData let i = index" style="color:brown;">
                      {{line.weight}}
                  </li>
                </ul>
                      </td>
                      <td>
                      <div *ngFor = "let line of weightData let i = index">
                          <span (click)='remove(i)'><i class="bi bi-trash"></i></span>
                      </div>
                    </td>

                    </tr>
                  </tbody>
                </table>
                  <button type="button" class="btn btn-primary" (click)='clearData()'>Clear</button>
              </div>
          </div>

          <p></p>

          <div class="card">
            <div class="card-header">
              <h5 class="h5">Weight Chart</h5>
            </div>
            <div class="card-body" style="min-height: 300px;max-height: 500px;">
              <p><div echarts [options]="options" class="demo-chart"></div>
            </div>
          </div>

          <p></p>

        </div>


        <div class="col-lg-3">
          <div class="card advert">
            <div class="card-header">
              <h5 class="h5">Advertisement</h5>
            </div>
            <div>
              <a [href]="currentLink()">
                <div class="image-frame">
                  <img [src]="currentImage()" alt="Adverts" class="fade-in">
                </div>
              </a>
            </div>
          </div>
          </div>
    </div>
<p>
  <div class="row">



          <div class="col-md-3">

          </div>


      <div class="col-md-4">

      </div>

      <div class="col-md-5">

        <div class="card-header">
          <h5>Food List</h5>
        </div>
        <div class="card-body" style="min-height: 150px;max-height: 200px;">
          <ul>
            <li *ngFor = "let line of goalData let i = index">
                {{line.goal}}
            </li>
          </ul>
            <input type='text'[(ngModel)]='goal' placeholder='Goal'>
            <p><button type="button" class="btn btn-info" (click)='handleGoalClick()'>Add</button>
        </div>
        </div>-->
        </div>
      </div>

</div>
